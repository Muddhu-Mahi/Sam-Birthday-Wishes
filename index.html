<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✦ For Sam... ✦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        :root {
            --pink-love: #ff4d6d;
            --rose-dream: #ff8cae;
            --golden-spark: #ffdd88;
            --deep-purple: #9b5de5;
            --night-sky: #03000c;
        }

        body {
            background: var(--night-sky);
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            touch-action: pan-y pinch-zoom;
            position: relative;
        }

        /* starfield background */
        #stars-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* intro overlay — dreamy */
        .intro-sacred {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0418, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(12px);
            transition: opacity 1.8s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 1;
        }

        /* HEART – original smooth zoom pulse */
        .heart-gate {
            font-size: clamp(80px, 24vw, 120px);
            cursor: pointer;
            line-height: 1;
            position: relative;
            user-select: none;
            touch-action: manipulation;
            color: #ff9ec3;
            background: none;
            transform: perspective(800px) translateZ(0);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 15px 25px rgba(255, 150, 190, 0.35));
            animation: softZoomPulse 2s ease-in-out infinite;
            z-index: 10;
        }

        .heart-gate::before {
            content: '❤️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: inherit;
            opacity: 0.18;
            filter: blur(18px) brightness(1.2);
            z-index: -1;
            transition: all 0.6s ease;
        }

        @keyframes softZoomPulse {
            0%, 100% { 
                transform: perspective(800px) translateZ(0) scale(1); 
            }
            50% { 
                transform: perspective(800px) translateZ(0) scale(1.12); 
            }
        }

        /* HEART – disappears INSTANTLY (no transition, no animation) */
        .heart-gate.fade-out-heart {
            animation: none;
            transition: none;
            opacity: 0 !important;
            transform: scale(1);
            filter: drop-shadow(0 0 0 rgba(255, 150, 190, 0));
            pointer-events: none;
            visibility: visible;
        }

        /* TEXT – graceful fade‑out like balloon messages */
        .touch-heart.fade-out-text {
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1),
                        transform 1.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 0 !important;
            transform: scale(0.9);
            pointer-events: none;
            visibility: visible;
        }

        .touch-heart {
            margin-top: 28px;
            font-family: 'Dancing Script', 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            color: #ffb7c5;
            text-shadow: 0 0 8px rgba(255, 100, 150, 0.5);
            letter-spacing: 1px;
            background: none;
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 60px;
            pointer-events: none;
        }

        /* main world */
        #dreamscape {
            opacity: 0;
            transition: opacity 2.2s cubic-bezier(0.3, 0.9, 0.2, 1);
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        #dreamscape.reveal {
            opacity: 1;
            pointer-events: auto;
        }

        .title-magic {
            font-family: 'Times New Roman', Times, serif;
            font-weight: 400;
            font-style: italic;
            text-align: center;
            padding-top: max(24px, 4vh);
            font-size: clamp(2.8rem, 14vw, 5.6rem);
            color: #ffb7c5;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 200, 180, 0.5), 0 0 20px rgba(255, 77, 109, 0.3);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            animation: titleFloat 4s ease-in-out infinite;
            pointer-events: none;
            transition: opacity 0.8s ease;
            will-change: transform;
        }
        .title-magic.hide-title {
            opacity: 0;
            visibility: hidden;
        }
        @keyframes titleFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .balloon-sky {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 20;
        }

        .balloon {
            position: absolute;
            width: clamp(68px, 18vw, 105px);
            height: calc(clamp(68px, 18vw, 105px) * 1.28);
            border-radius: 50% 50% 50% 50% / 50% 50% 45% 45%;
            cursor: pointer;
            pointer-events: auto;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 18px rgba(0,0,0,0.2), inset 0 -2px 0 rgba(0,0,0,0.05);
            animation: floatUp var(--float-duration) linear forwards;
            transition: filter 0.1s;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .balloon:active { filter: brightness(1.05); transform: scale(0.97); }
        .balloon::before {
            content: "✦";
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: rgba(255,245,170,0.9);
            text-shadow: 0 0 3px gold;
            opacity: 0.7;
            pointer-events: none;
            z-index: 2;
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -28px;
            left: 50%;
            width: 2px;
            height: 32px;
            background: linear-gradient(135deg, #ddd9c0, #b89a6e);
            transform: translateX(-50%);
            border-radius: 1px;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(-2deg); opacity: 0.9; }
            100% { transform: translateY(-150vh) rotate(3deg); opacity: 0.5; }
        }

        /* MESSAGE BOX — horizontally widened */
        .floating-message {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(20, 10, 25, 0.92);
            backdrop-filter: blur(18px);
            padding: 1.2rem 3rem;
            border-radius: 40px;
            font-family: 'Dancing Script', 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            text-align: center;
            color: rgb(255, 210, 220);
            max-width: 92vw;
            width: auto;
            min-width: 280px;
            box-shadow: 0 0 55px rgba(255, 77, 109, 0.65), 0 0 22px rgba(255, 215, 150, 0.45);
            letter-spacing: 1px;
            z-index: 200;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1), transform 1.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            pointer-events: none;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(255, 100, 120, 0.9);
            will-change: transform, opacity;
            word-break: break-word;
            white-space: normal;
            box-sizing: border-box;
        }
        .floating-message.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #final-veil {
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 70;
            opacity: 0;
            transition: opacity 4s ease;
            pointer-events: none;
        }
        #final-veil.active {
            background: #000000;
            opacity: 1;
        }

        .grand-message {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-weight: 500;
            font-style: italic;
            background: #000000;
            color: #fff8ed;
            z-index: 100;
            opacity: 0;
            transition: opacity 5s ease 3s;
            pointer-events: none;
            text-align: center;
            box-sizing: border-box;
        }
        .grand-message.visible {
            opacity: 1;
        }
        .final-center-text {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            text-shadow: 0 0 30px #ffb347, 0 0 60px #ff4d6d;
            padding: 1rem;
            line-height: 1.4;
            max-width: 85vw;
        }
        .final-bottom-text {
            position: absolute;
            bottom: 12px;
            width: 100%;
            text-align: center;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.5px;
            color: rgba(255, 245, 210, 0.65);
            background: none;
            padding: 6px 0;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 80;
        }

        .heart-shower {
            position: absolute;
            font-size: 1.6rem;
            pointer-events: none;
            animation: floatHeartSoft 7s linear forwards;
            z-index: 90;
            will-change: transform;
        }
        @keyframes floatHeartSoft {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-130vh) rotate(360deg); opacity: 0; }
        }

        /* Celebration elements */
        .celebration-element {
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .celebration-element.fade-out {
            opacity: 0 !important;
        }

        .finale-heart {
            position: fixed;
            bottom: -30px;
            font-size: 2rem;
            pointer-events: none;
            z-index: 95;
            animation: riseAndTwinkle 4s ease-out forwards;
            will-change: transform;
            filter: drop-shadow(0 0 4px gold);
        }
        @keyframes riseAndTwinkle {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg) scale(0.6);
                opacity: 0;
            }
        }

        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffdd88, #ffaa66);
            border-radius: 50%;
            pointer-events: none;
            z-index: 96;
            animation: sparkleFall 1.8s linear forwards;
        }
        @keyframes sparkleFall {
            0% {
                transform: translateY(-10px) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
        }

        .glow-orb {
            position: absolute;
            background: radial-gradient(circle, #ffdd99, #ffb347);
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
            animation: floatUpGlow 8s linear forwards;
            z-index: 85;
            opacity: 0;
            will-change: transform;
        }
        @keyframes floatUpGlow {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        .burst-heart {
            position: fixed;
            pointer-events: none;
            font-size: 1.8rem;
            z-index: 10002;
            animation: burstFloat 1.2s ease-out forwards;
            will-change: transform, opacity;
        }
        @keyframes burstFloat {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 40px), var(--dy, -80px)) scale(0.3) rotate(360deg);
                opacity: 0;
            }
        }

        .grand-message.pulse-glow {
            animation: gentlePulse 2s infinite ease-in-out;
        }
        @keyframes gentlePulse {
            0% { text-shadow: 0 0 10px #ffb347, 0 0 20px #ff4d6d; }
            50% { text-shadow: 0 0 30px #ffb347, 0 0 50px #ff4d6d; }
            100% { text-shadow: 0 0 10px #ffb347, 0 0 20px #ff4d6d; }
        }

        @media (max-width: 600px) {
            .balloon { width: 70px; height: 88px; }
            .balloon::after { height: 24px; bottom: -22px; }
            .floating-message {
                padding: 0.9rem 2.5rem;
                font-size: clamp(1rem, 4.5vw, 1.5rem);
                max-width: 96vw;
                min-width: 280px;
                border-radius: 48px;
                line-height: 1.35;
                letter-spacing: 0.5px;
            }
            .final-center-text { font-size: clamp(1.2rem, 5vw, 2rem); }
            .final-bottom-text { font-size: 0.7rem; bottom: 8px; }
            .title-magic { white-space: nowrap; overflow-x: auto; max-width: 95vw; }
            .finale-heart { font-size: 1.4rem; }
        }
        
        @media (min-width: 1400px) {
            .floating-message {
                max-width: 800px;
                padding: 1.4rem 3.5rem;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, .balloon, .heart-shower, .floating-message { animation: none !important; transition: none !important; }
            .balloon { display: none; }
        }
        .hint-tap {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 300;
            color: rgba(255,220,200,0.6);
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 5px 16px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            z-index: 25;
            pointer-events: none;
            font-family: monospace;
            transition: opacity 0.8s ease;
        }
        .hint-tap.hide-hint {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="introScreen" class="intro-sacred">
    <div class="heart-gate" id="unlockHeart">❤️</div>
    <div class="touch-heart" id="touchHeartText">✨ Touch my heart Sam... ✨</div>
</div>

<div id="dreamscape">
    <h1 class="title-magic">Sam...</h1>
    <div id="balloonContainer" class="balloon-sky"></div>
    <div class="hint-tap">✨Tap balloons✨</div>
</div>

<div id="final-veil"></div>
<div id="grandFinaleMessage" class="grand-message"></div>
<canvas id="particle-canvas"></canvas>

<script>
    (function() {
        const secretMessages = [
            "🎂 Happy Birthday Sam… our family’s Lady Power Star 👑🔥",
            "Caring by heart 💖",
            "Understanding without words 🤍",
            "Kind-hearted… but stronger than you show 💖⚡",
            "Modern in style, traditional in values 🌸✨",
            "Your smile? Pure magic 😊✨",
            "Your laugh? Better than any playlist 🎶😌",
            "When you smile… even stars feel jealous ✨😌",
            "You make confidence look beautiful 😌💖",
            "Your attitude… confidently unstoppable 😏🔥",
            "You talk straight, no filters… and that’s your power 💯",
            "Strong mind… soft heart… rare combination 💖⚡",
            "There’s a charm in you that words can’t fully explain 💭💫",
            "You don’t try to stand out… it just happens 😌🔥",
            "You don’t chase attention… it finds you 👀🔥",
            "Simple… yet impossible to ignore 😏✨",
            "Confidence like yours? Rare… and a little dangerous 😏⚡",
            "Effortless charm… still stealing attention 😌👑",
            "You’re not just beautiful… you’re a whole vibe 💖",

            "Only a few balloons left… are you ready for the grand finale? 😌✨",

            "Wherever you go… vibes try to catch up 👀🔥",
            "When you walk in… time slows down, just to notice you ⏳😌",
            "You don’t need lights… you already glow 💫🔥",
            "You don’t follow trends… you create your own vibe 💫🔥",
            "Somewhere between your smile and attitude… people get lost 😏💖",

            "Only 3 more left...",
            "2… ⏳",
            "1… 💖",

            "Happy Birthday once again… stay exactly the way you are… because that’s what makes you truly unforgettable 💖✨"
        ];
        
        const balloonImages = [
            "https://ik.imagekit.io/njn8geuh0/IMG_20240411_174238.jpg"
        ];

        let currentMsgIndex = 0;
        let balloonInterval = null;
        let heartRainInterval = null;
        let glowOrbInterval = null;
        let finalTriggered = false;
        let waitingForFinale = false;
        let musicPlayer = null;
        let firstTapOccurred = false;
        let heartClicked = false;
        
        let celebrationTimeouts = [];
        
        const introDiv = document.getElementById('introScreen');
        const dreamscape = document.getElementById('dreamscape');
        const balloonContainer = document.getElementById('balloonContainer');
        const finalVeil = document.getElementById('final-veil');
        const finalMsgDiv = document.getElementById('grandFinaleMessage');
        const titleElement = document.querySelector('.title-magic');
        const hintTap = document.querySelector('.hint-tap');
        const heartElement = document.getElementById('unlockHeart');
        const touchText = document.getElementById('touchHeartText');
        
        const balloonColors = ['#FF9FBB', '#F6AE9A', '#D9B4FF', '#FFD966', '#F4ACB7', '#A7C7E7', '#FFB3BA', '#C3A5F0'];
        
        // Starfield
        const starCanvas = document.getElementById('stars-canvas');
        const starCtx = starCanvas.getContext('2d');
        let starsArray = [];
        function initStars() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            const starCount = Math.min(180, Math.floor(window.innerWidth * window.innerHeight / 5000));
            for (let i = 0; i < starCount; i++) {
                starsArray.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * starCanvas.height,
                    radius: Math.random() * 2.2 + 0.8,
                    alpha: Math.random() * 0.6 + 0.2,
                    twinkleSpeed: 0.008 + Math.random() * 0.02,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
            animateStars();
        }
        let starAnimationFrame;
        function animateStars() {
            if (!starCtx) return;
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            for (let s of starsArray) {
                s.alpha += s.twinkleSpeed * s.twinkleDir;
                if (s.alpha > 0.85) { s.alpha = 0.85; s.twinkleDir = -1; }
                if (s.alpha < 0.2) { s.alpha = 0.2; s.twinkleDir = 1; }
                starCtx.beginPath();
                starCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                starCtx.fillStyle = `rgba(255, 240, 200, ${s.alpha * 0.9})`;
                starCtx.fill();
            }
            starAnimationFrame = requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', () => {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            starsArray = [];
            initStars();
        });
        
        // Particles
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];
        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => resizeParticleCanvas());
        resizeParticleCanvas();
        
        function addBurst(x, y, baseColor) {
            const particleCount = Math.min(16, window.innerWidth < 600 ? 12 : 16);
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 10;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 5,
                    size: 3 + Math.random() * 8,
                    color: baseColor || `hsl(${Math.random() * 40 + 320}, 80%, 65%)`,
                    alpha: 0.9,
                    life: 0.98,
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12
                });
            }
        }
        
        function renderParticles() {
            if (!pCtx) return;
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.alpha *= 0.97;
                p.life -= 0.012;
                if (p.alpha <= 0.02 || p.life <= 0 || p.y > particleCanvas.height + 100) {
                    particles.splice(i,1);
                    i--;
                    continue;
                }
                pCtx.save();
                pCtx.globalAlpha = p.alpha * p.life;
                pCtx.fillStyle = p.color;
                pCtx.translate(p.x, p.y);
                pCtx.rotate(p.rot * Math.PI / 180);
                pCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                pCtx.restore();
                p.rot += p.rotSpeed;
            }
            requestAnimationFrame(renderParticles);
        }
        renderParticles();
        
        let activeFloatingHearts = 0;
        const MAX_FLOATING_HEARTS = window.innerWidth < 600 ? 18 : 24;
        
        function spawnAmbientHeart() {
            if (finalTriggered || waitingForFinale) return;
            if (activeFloatingHearts >= MAX_FLOATING_HEARTS) return;
            const heartDiv = document.createElement('div');
            heartDiv.className = 'heart-shower';
            heartDiv.innerHTML = Math.random() > 0.6 ? '❤️' : '✨';
            heartDiv.style.left = Math.random() * 100 + '%';
            heartDiv.style.bottom = '-20px';
            heartDiv.style.fontSize = (Math.random() * 18 + 16) + 'px';
            heartDiv.style.opacity = 0.7;
            heartDiv.style.animationDuration = 5 + Math.random() * 5 + 's';
            heartDiv.addEventListener('animationend', () => { activeFloatingHearts--; });
            document.body.appendChild(heartDiv);
            activeFloatingHearts++;
            setTimeout(() => heartDiv.remove(), 7000);
        }
        
        function spawnGlowOrb() {
            if (finalTriggered || waitingForFinale) return;
            if (window.innerWidth < 600 && Math.random() > 0.6) return;
            const orb = document.createElement('div');
            orb.className = 'glow-orb';
            const size = Math.random() * 12 + 5;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + '%';
            orb.style.animationDuration = 6 + Math.random() * 6 + 's';
            orb.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(orb);
            setTimeout(() => orb.remove(), 10000);
        }
        
        function showPopupMessage(text, durationMs = 4000) {
            const existingMsg = document.querySelector('.floating-message');
            if (existingMsg) existingMsg.remove();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'floating-message';
            msgDiv.textContent = text;
            document.body.appendChild(msgDiv);
            msgDiv.offsetHeight;
            msgDiv.classList.add('visible');
            setTimeout(() => {
                msgDiv.classList.remove('visible');
                setTimeout(() => {
                    if (msgDiv.parentNode) msgDiv.remove();
                }, 1300);
            }, durationMs);
        }
        
        function spawnHeartBurst(centerX, centerY) {
            const burstCount = 28;
            for (let i = 0; i < burstCount; i++) {
                const heartSpan = document.createElement('div');
                heartSpan.className = 'burst-heart';
                heartSpan.innerHTML = ['❤️', '💖', '💗', '💓', '💘', '💝', '✨'][Math.floor(Math.random() * 7)];
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 100;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 40;
                heartSpan.style.setProperty('--dx', dx + 'px');
                heartSpan.style.setProperty('--dy', dy + 'px');
                heartSpan.style.left = (centerX - 18) + 'px';
                heartSpan.style.top = (centerY - 20) + 'px';
                heartSpan.style.fontSize = (18 + Math.random() * 20) + 'px';
                document.body.appendChild(heartSpan);
                setTimeout(() => heartSpan.remove(), 1200);
            }
        }
        
        function removeAllBalloons() {
            document.querySelectorAll('.balloon').forEach(b => b.remove());
        }
        
        function fadeOutAndRemoveCelebrationElements() {
            const elements = document.querySelectorAll('.finale-heart, .sparkle, .heart-shower, .star-rain');
            elements.forEach(el => {
                el.classList.add('celebration-element', 'fade-out');
                setTimeout(() => {
                    if (el.parentNode) el.remove();
                }, 800);
            });
        }
        
        function startCelebrationEffects() {
            // Hearts rising from bottom (unchanged)
            for (let i = 0; i < 120; i++) {
                const timeoutId = setTimeout(() => {
                    const heartDiv = document.createElement('div');
                    heartDiv.className = 'finale-heart celebration-element';
                    const symbols = ['❤️', '💖', '💗', '💓', '💘', '💝', '✨', '⭐', '🌹'];
                    heartDiv.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    heartDiv.style.left = Math.random() * 100 + '%';
                    heartDiv.style.fontSize = (Math.random() * 28 + 20) + 'px';
                    heartDiv.style.animationDuration = 3.5 + Math.random() * 1.5 + 's';
                    heartDiv.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(heartDiv);
                    heartDiv.addEventListener('animationend', () => heartDiv.remove());
                }, i * 45);
                celebrationTimeouts.push(timeoutId);
            }
            
            // Sparkle shower (unchanged)
            for (let i = 0; i < 200; i++) {
                const timeoutId = setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle celebration-element';
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = Math.random() * 30 + '%';
                    sparkle.style.width = (Math.random() * 6 + 2) + 'px';
                    sparkle.style.height = sparkle.style.width;
                    sparkle.style.animationDuration = 1.2 + Math.random() * 1 + 's';
                    sparkle.style.animationDelay = Math.random() * 0.6 + 's';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 2500);
                }, i * 35);
                celebrationTimeouts.push(timeoutId);
            }
            
            // Star rain (unchanged)
            const starRainCount = window.innerWidth < 600 ? 60 : 80;
            for (let i = 0; i < starRainCount; i++) {
                const timeoutId = setTimeout(() => {
                    const starRain = document.createElement('span');
                    starRain.className = 'star-rain celebration-element';
                    starRain.style.position = 'absolute';
                    starRain.style.width = Math.random() * 6 + 2 + 'px';
                    starRain.style.height = starRain.style.width;
                    starRain.style.background = `radial-gradient(circle, #FFD966, #FF9FBB)`;
                    starRain.style.borderRadius = '50%';
                    starRain.style.left = Math.random() * 100 + '%';
                    starRain.style.top = '-20px';
                    starRain.style.boxShadow = '0 0 12px gold';
                    starRain.style.pointerEvents = 'none';
                    starRain.style.animation = `fallDown ${3 + Math.random() * 2.5}s linear forwards`;
                    document.body.appendChild(starRain);
                    setTimeout(() => starRain.remove(), 6000);
                }, i * 25);
                celebrationTimeouts.push(timeoutId);
            }
            
            if (!document.querySelector('#fallDownStyle')) {
                const styleSheet = document.createElement("style");
                styleSheet.id = 'fallDownStyle';
                styleSheet.textContent = `@keyframes fallDown { 0% { transform: translateY(0) rotate(0deg); opacity: 0.9; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }`;
                document.head.appendChild(styleSheet);
            }
            
            // CENTRAL HEART BURST — REDUCED COUNT & SHORTER DURATION
            const finalBurstTimeout = setTimeout(() => {
                // Reduced from 70-90 to 35-45 hearts
                const burstCount = window.innerWidth < 600 ? 35 : 45;
                for (let h = 0; h < burstCount; h++) {
                    const innerTimeout = setTimeout(() => {
                        const heartBurst = document.createElement('div');
                        heartBurst.className = 'heart-shower celebration-element';
                        heartBurst.innerHTML = '❤️';
                        heartBurst.style.left = window.innerWidth/2 + (Math.random() - 0.5) * 200 + 'px';
                        heartBurst.style.top = window.innerHeight/2 - 50 + 'px';
                        heartBurst.style.fontSize = (12 + Math.random() * 18) + 'px';
                        // Shorter animation: from 4s down to 2.5s
                        heartBurst.style.animation = `floatHeartSoft 2.5s linear forwards`;
                        heartBurst.style.opacity = '0.9';
                        document.body.appendChild(heartBurst);
                        setTimeout(() => heartBurst.remove(), 3000);
                    }, h * 12);
                    celebrationTimeouts.push(innerTimeout);
                }
            }, 300);
            celebrationTimeouts.push(finalBurstTimeout);
        }
        
        function showFinalCredit() {
            fadeOutAndRemoveCelebrationElements();
            finalMsgDiv.innerHTML = `
                <div class="final-center-text">🌹 Made with 💖 by Mahi 🌹</div>
                <div class="final-bottom-text">© 2026 Mahi</div>
            `;
            finalMsgDiv.classList.add('visible');
            finalMsgDiv.classList.add('pulse-glow');
        }
        
        async function handleHeartTouch(e) {
            if (heartClicked) return;
            heartClicked = true;
            
            heartElement.classList.add('fade-out-heart');
            if (touchText) touchText.classList.add('fade-out-text');
            
            const rect = heartElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            spawnHeartBurst(centerX, centerY);
            addBurst(centerX, centerY, '#ff99cc');
            
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.inset = '0';
            flash.style.background = 'radial-gradient(circle, rgba(255,200,180,0.3), transparent)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '10001';
            flash.style.opacity = '0.8';
            flash.style.transition = 'opacity 0.4s ease';
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 500); }, 100);
            
            setTimeout(async () => {
                try { await initMusicOnUserGesture(); } catch(err) {}
                introDiv.style.opacity = '0';
                setTimeout(() => {
                    introDiv.style.display = 'none';
                    dreamscape.classList.add('reveal');
                    balloonInterval = setInterval(() => { if (!finalTriggered && !waitingForFinale) spawnBalloon(); }, 2200);
                    heartRainInterval = setInterval(() => { if (!finalTriggered && !waitingForFinale) spawnAmbientHeart(); }, 2200);
                    glowOrbInterval = setInterval(() => { if (!finalTriggered && !waitingForFinale) spawnGlowOrb(); }, 2000);
                    for (let i = 0; i < 3; i++) setTimeout(() => spawnBalloon(), i * 500);
                }, 1500);
            }, 600);
        }
        
        function spawnBalloon() {
            if (finalTriggered || waitingForFinale) return;
            if (currentMsgIndex >= secretMessages.length) return;
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            const randomImage = balloonImages[Math.floor(Math.random() * balloonImages.length)];
            balloon.style.backgroundImage = `url('${randomImage}')`;
            balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloon.style.left = (5 + Math.random() * 85) + "%";
            const duration = 14 + Math.random() * 10;
            balloon.style.setProperty('--float-duration', duration + "s");
            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                if (finalTriggered || waitingForFinale) return;
                if (!firstTapOccurred && hintTap && !hintTap.classList.contains('hide-hint')) {
                    firstTapOccurred = true;
                    hintTap.classList.add('hide-hint');
                }
                
                const isLast = (currentMsgIndex === secretMessages.length - 1);
                const msgToShow = secretMessages[currentMsgIndex];
                const displayDuration = isLast ? 8000 : 4000;
                showPopupMessage(msgToShow, displayDuration);
                
                const rect = balloon.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                addBurst(centerX, centerY, 'rgba(255, 200, 150, 0.8)');
                balloon.remove();
                currentMsgIndex++;
                
                if (isLast && !finalTriggered && !waitingForFinale) {
                    waitingForFinale = true;
                    if (balloonInterval) clearInterval(balloonInterval);
                    if (heartRainInterval) clearInterval(heartRainInterval);
                    if (glowOrbInterval) clearInterval(glowOrbInterval);
                    removeAllBalloons();
                    if (titleElement) titleElement.classList.add('hide-title');
                    if (hintTap) hintTap.classList.add('hide-hint');
                    
                    startCelebrationEffects();
                    
                    // Cleanup celebration effects before message fades out
                    const cleanupDelay = displayDuration - 800;
                    const cleanupTimeout = setTimeout(() => {
                        fadeOutAndRemoveCelebrationElements();
                    }, Math.max(0, cleanupDelay));
                    celebrationTimeouts.push(cleanupTimeout);
                    
                    const finaleDelay = displayDuration + 1400;
                    const finaleTimeout = setTimeout(() => {
                        if (!finalTriggered) {
                            finalTriggered = true;
                            finalVeil.classList.add('active');
                            showFinalCredit();
                        }
                    }, finaleDelay);
                    celebrationTimeouts.push(finaleTimeout);
                }
            });
            balloonContainer.appendChild(balloon);
            setTimeout(() => { if (balloon.parentNode) balloon.remove(); }, duration * 1000 + 800);
        }
        
        function initMusicOnUserGesture() {
            return new Promise((resolve) => {
                const existingPlayerDiv = document.getElementById('youtube-audio');
                if (existingPlayerDiv) return resolve();
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                window.onYouTubeIframeAPIReady = () => {
                    const playerDiv = document.createElement('div');
                    playerDiv.id = 'youtube-audio';
                    playerDiv.style.display = 'none';
                    document.body.appendChild(playerDiv);
                    musicPlayer = new YT.Player('youtube-audio', {
                        videoId: 'BSJa1UytM8w',
                        playerVars: { autoplay: 1, controls: 0, loop: 1, modestbranding: 1, rel: 0, playlist: 'BSJa1UytM8w' },
                        events: { onReady: (event) => { event.target.playVideo(); event.target.setVolume(55); resolve(); } }
                    });
                };
                if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
            });
        }
        
        heartElement.addEventListener('click', handleHeartTouch);
        initStars();
        resizeParticleCanvas();
        document.body.addEventListener('touchmove', (e) => { if (e.target.closest('.balloon')) return; }, { passive: false });
        window.addEventListener('beforeunload', () => {
            if (balloonInterval) clearInterval(balloonInterval);
            if (heartRainInterval) clearInterval(heartRainInterval);
            if (glowOrbInterval) clearInterval(glowOrbInterval);
            if (starAnimationFrame) cancelAnimationFrame(starAnimationFrame);
            celebrationTimeouts.forEach(t => clearTimeout(t));
        });
    })();
</script>
</body>
</html>
