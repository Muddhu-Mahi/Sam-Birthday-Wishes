<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✦ For Sam... ✦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        :root {
            --pink-love: #ff4d6d;
            --rose-dream: #ff8cae;
            --golden-spark: #ffdd88;
            --deep-purple: #9b5de5;
            --night-sky: #03000c;
        }

        body {
            background: var(--night-sky);
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            touch-action: pan-y pinch-zoom;
            position: relative;
        }

        /* starfield background */
        #stars-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* intro overlay — dreamy */
        .intro-sacred {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0418, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(12px);
            transition: opacity 1.8s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 1;
        }

        /* Heart – scales and gets a soft blur during zoom */
        .heart-gate {
            font-size: clamp(65px, 20vw, 80px);
            cursor: pointer;
            transition: transform 0.2s ease;
            animation: celestialBeat 1.6s infinite ease-in-out;
            line-height: 1;
            color: #ff4d6d;
            will-change: transform, filter;
        }
        .heart-gate:active { transform: scale(0.92); }

        @keyframes celestialBeat {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 6px rgba(255, 77, 109, 0.3)) blur(0px);
            }
            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 12px rgba(255, 77, 109, 0.7)) blur(2px);
            }
        }

        /* Invitation text – static glow only */
        .touch-heart {
            font-family: 'Dancing Script', 'Times New Roman', Times, serif;
            font-weight: 400;
            font-style: italic;
            text-align: center;
            font-size: clamp(1.4rem, 5vw, 2rem);
            color: #ffb7c5;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 200, 180, 0.4);
            margin-top: 1.5rem;
            animation: softGlow 3s infinite alternate;
        }

        @keyframes softGlow {
            0% { filter: drop-shadow(0 0 3px #ff758f); opacity: 0.8; }
            100% { filter: drop-shadow(0 0 20px #ffb3c6); opacity: 1; }
        }

        /* main world */
        #dreamscape {
            opacity: 0;
            transition: opacity 2.2s cubic-bezier(0.3, 0.9, 0.2, 1);
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        #dreamscape.reveal {
            opacity: 1;
            pointer-events: auto;
        }

        /* ONLY the "Sam..." title moves up/down */
        .title-magic {
            font-family: 'Times New Roman', Times, serif;
            font-weight: 400;
            font-style: italic;
            text-align: center;
            padding-top: max(24px, 4vh);
            font-size: clamp(3rem, 14vw, 5.6rem);
            color: #ffb7c5;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 200, 180, 0.5), 0 0 20px rgba(255, 77, 109, 0.3);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            animation: titleFloat 4s ease-in-out infinite;
            pointer-events: none;
            transition: opacity 0.8s ease;
            will-change: transform;
        }

        .title-magic.hide-title {
            opacity: 0;
            visibility: hidden;
        }

        @keyframes titleFloat {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        /* balloon container */
        .balloon-sky {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 20;
        }

        /* Balloon – now filled entirely with photo */
        .balloon {
            position: absolute;
            width: clamp(68px, 18vw, 105px);
            height: calc(clamp(68px, 18vw, 105px) * 1.28);
            border-radius: 50% 50% 50% 50% / 50% 50% 45% 45%;
            cursor: pointer;
            pointer-events: auto;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 18px rgba(0,0,0,0.2), inset 0 -2px 0 rgba(0,0,0,0.05);
            animation: floatUp var(--float-duration) linear forwards;
            transition: filter 0.1s;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .balloon:active { filter: brightness(1.05); transform: scale(0.97); }
        .balloon::before {
            content: "✦";
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: rgba(255,245,170,0.9);
            text-shadow: 0 0 3px gold;
            opacity: 0.7;
            pointer-events: none;
            z-index: 2;
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -28px;
            left: 50%;
            width: 2px;
            height: 32px;
            background: linear-gradient(135deg, #ddd9c0, #b89a6e);
            transform: translateX(-50%);
            border-radius: 1px;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(-2deg); opacity: 0.9; }
            100% { transform: translateY(-150vh) rotate(3deg); opacity: 0.5; }
        }

        /* message pop style — smooth fade, extended duration for comfortable reading */
        .floating-message {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -45%);
            background: rgba(20, 10, 25, 0.85);
            backdrop-filter: blur(12px);
            padding: 1.2rem 2.2rem;
            border-radius: 28px;
            font-family: 'Dancing Script', 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1.6rem, 7vw, 2.8rem);
            text-align: center;
            color: rgb(255, 200, 210);
            max-width: 85vw;
            width: max-content;
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.5), 0 0 15px rgba(255, 215, 150, 0.3);
            letter-spacing: 1px;
            z-index: 200;
            opacity: 0;
            animation: smoothFade 5.6s ease forwards;
            pointer-events: none;
            line-height: 1.3;
            text-shadow: 0 0 6px rgba(255, 100, 120, 0.8);
            white-space: normal;
        }
        @keyframes smoothFade {
            0% { opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* finale layers */
        #final-veil {
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 70;
            opacity: 0;
            transition: opacity 4s ease;
            pointer-events: none;
        }
        #final-veil.active {
            background: #000000;
            opacity: 1;
        }

        /* GRAND FINALE MESSAGE — absolutely static */
        .grand-message {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-weight: 500;
            font-style: italic;
            font-size: clamp(1.4rem, 5vw, 2.8rem);
            text-align: center;
            padding: 2rem 1.5rem;
            background: #000000;
            color: #fff8ed;
            text-shadow: 0 0 30px #ffb347, 0 0 60px #ff4d6d;
            z-index: 100;
            opacity: 0;
            transition: opacity 4s ease 2.2s;
            pointer-events: none;
            backdrop-filter: none;
            border-radius: 0;
            line-height: 1.5;
            letter-spacing: 1px;
            box-sizing: border-box;
            overflow-y: auto;
            transform: none !important;
            animation: none !important;
            will-change: auto;
        }
        .grand-message.visible { opacity: 1; }

        /* canvas particles + effects */
        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 80;
        }

        .heart-shower {
            position: absolute;
            font-size: 1.6rem;
            pointer-events: none;
            animation: floatHeartSoft 7s linear forwards;
            z-index: 90;
            will-change: transform;
        }
        @keyframes floatHeartSoft {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-130vh) rotate(360deg); opacity: 0; }
        }

        /* glowing orbs for extra sparkle (reduced in finale) */
        .glow-orb {
            position: absolute;
            background: radial-gradient(circle, #ffdd99, #ffb347);
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
            animation: floatUpGlow 8s linear forwards;
            z-index: 85;
            opacity: 0;
            will-change: transform;
        }
        @keyframes floatUpGlow {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        @media (max-width: 600px) {
            .balloon { width: 70px; height: 88px; }
            .balloon::after { height: 24px; bottom: -22px; }
            .floating-message { padding: 0.9rem 1.5rem; font-size: clamp(1.4rem, 6vw, 2.2rem); }
            .grand-message {
                font-size: clamp(1.2rem, 4.5vw, 2rem);
                padding: 1.5rem 1rem;
                line-height: 1.4;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *, .balloon, .heart-shower, .floating-message { animation: none !important; transition: none !important; }
            .balloon { display: none; }
        }
        /* subtle guide */
        .hint-tap {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 300;
            color: rgba(255,220,200,0.6);
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 5px 16px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            z-index: 25;
            pointer-events: none;
            font-family: monospace;
            transition: opacity 0.8s ease;
        }
        .hint-tap.hide-hint {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="introScreen" class="intro-sacred">
    <div class="heart-gate" id="unlockHeart">❤️</div>
    <div class="touch-heart">✨ Touch my heart Sam... ✨</div>
</div>

<div id="dreamscape">
    <h1 class="title-magic">Sam...</h1>
    <div id="balloonContainer" class="balloon-sky"></div>
    <div class="hint-tap">✨Tap balloons✨</div>
</div>

<div id="final-veil"></div>
<div id="grandFinaleMessage" class="grand-message"></div>
<canvas id="particle-canvas"></canvas>

<script>
    (function() {
        // ==========  ROMANTIC MESSAGES ==========
        const secretMessages = [
            "🎂 Happy Birthday Sam… our family’s Lady Power Star 👑🔥",
            "Caring by heart 💖",
            "Understanding without words 🤍",
            "Kind-hearted… but stronger than you show 💖⚡",
            "Modern in style, traditional in values 🌸✨",
            "Your smile? Pure magic 😊✨",
            "Your laugh? Better than any playlist 🎶😌",
            "When you smile… even stars feel jealous ✨😌",
            "You make confidence look beautiful 😌💖",
            "Your attitude… confidently unstoppable 😏🔥",
            "You talk straight, no filters… and that’s your power 💯",
            "Strong mind… soft heart… rare combination 💖⚡",
            "There’s a charm in you that words can’t fully explain 💭💫",
            "You don’t try to stand out… it just happens 😌🔥",
            "You don’t chase attention… it finds you 👀🔥",
            "Simple… yet impossible to ignore 😏✨",
            "Confidence like yours? Rare… and a little dangerous 😏⚡",
            "Effortless charm… still stealing attention 😌👑",
            "You’re not just beautiful… you’re a whole vibe 💖",

            "Only a few balloons left… are you ready for the grand finale? 😌✨",

            "Wherever you go… vibes try to catch up 👀🔥",
            "When you walk in… time slows down, just to notice you ⏳😌",
            "You don’t need lights… you already glow 💫🔥",
            "You don’t follow trends… you create your own vibe 💫🔥",
            "Somewhere between your smile and attitude… people get lost 😏💖",

            "Only 3 more left...",
            "3… ⏳",
            "2… 💖",
            "1… 😏",

            "Happy Birthday once again… stay exactly the way you are… because that’s what makes you truly unforgettable 💖✨"
        ];
        
       const ultimateMessage = `© 2026 Mahi <br> Made with Passion & Love 💖✨`;

        // ==========  CUSTOM IMAGES FOR BALLOONS ==========
        // Replace these URLs with your own image links (square or any shape)
        // The images will cover the entire balloon surface.
        const balloonImages = [
            "https://ik.imagekit.io/njn8geuh0/IMG_20240411_174238.jpg"
        ];
        // You can add more images – the script will randomly pick one for each balloon

        let currentMsgIndex = 0;
        let balloonInterval = null;
        let heartRainInterval = null;
        let glowOrbInterval = null;
        let finalTriggered = false;
        let musicPlayer = null;
        
        const introDiv = document.getElementById('introScreen');
        const dreamscape = document.getElementById('dreamscape');
        const balloonContainer = document.getElementById('balloonContainer');
        const finalVeil = document.getElementById('final-veil');
        const finalMsgDiv = document.getElementById('grandFinaleMessage');
        const titleElement = document.querySelector('.title-magic');
        const hintTap = document.querySelector('.hint-tap');
        
        // Keep balloonColors for fallback in case an image fails to load
        const balloonColors = ['#FF9FBB', '#F6AE9A', '#D9B4FF', '#FFD966', '#F4ACB7', '#A7C7E7', '#FFB3BA', '#C3A5F0'];
        
        // ---------- Starfield ----------
        const starCanvas = document.getElementById('stars-canvas');
        const starCtx = starCanvas.getContext('2d');
        let starsArray = [];
        function initStars() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            const starCount = 180;
            for (let i = 0; i < starCount; i++) {
                starsArray.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * starCanvas.height,
                    radius: Math.random() * 2.2 + 0.8,
                    alpha: Math.random() * 0.6 + 0.2,
                    twinkleSpeed: 0.008 + Math.random() * 0.02,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
            animateStars();
        }
        let starAnimationFrame;
        function animateStars() {
            if (!starCtx) return;
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            for (let s of starsArray) {
                s.alpha += s.twinkleSpeed * s.twinkleDir;
                if (s.alpha > 0.85) { s.alpha = 0.85; s.twinkleDir = -1; }
                if (s.alpha < 0.2) { s.alpha = 0.2; s.twinkleDir = 1; }
                starCtx.beginPath();
                starCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                starCtx.fillStyle = `rgba(255, 240, 200, ${s.alpha * 0.9})`;
                starCtx.fill();
            }
            starAnimationFrame = requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', () => {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            starsArray = [];
            initStars();
        });
        
        // ---------- Particle System (optimised) ----------
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];
        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => resizeParticleCanvas());
        resizeParticleCanvas();
        
        function addBurst(x, y, baseColor) {
            const particleCount = 16;
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 10;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 5,
                    size: 3 + Math.random() * 8,
                    color: baseColor || `hsl(${Math.random() * 40 + 320}, 80%, 65%)`,
                    alpha: 0.9,
                    life: 0.98,
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12
                });
            }
        }
        
        function renderParticles() {
            if (!pCtx) return;
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.alpha *= 0.97;
                p.life -= 0.012;
                if (p.alpha <= 0.02 || p.life <= 0 || p.y > particleCanvas.height + 100) {
                    particles.splice(i,1);
                    i--;
                    continue;
                }
                pCtx.save();
                pCtx.globalAlpha = p.alpha * p.life;
                pCtx.fillStyle = p.color;
                pCtx.translate(p.x, p.y);
                pCtx.rotate(p.rot * Math.PI / 180);
                pCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                pCtx.restore();
                p.rot += p.rotSpeed;
            }
            requestAnimationFrame(renderParticles);
        }
        renderParticles();
        
        // limit floating hearts
        let activeFloatingHearts = 0;
        const MAX_FLOATING_HEARTS = 24;
        
        function spawnAmbientHeart() {
            if (finalTriggered) return;
            if (activeFloatingHearts >= MAX_FLOATING_HEARTS) return;
            const heartDiv = document.createElement('div');
            heartDiv.className = 'heart-shower';
            heartDiv.innerHTML = Math.random() > 0.6 ? '❤️' : '✨';
            heartDiv.style.left = Math.random() * 100 + '%';
            heartDiv.style.bottom = '-20px';
            heartDiv.style.fontSize = (Math.random() * 18 + 16) + 'px';
            heartDiv.style.opacity = 0.7;
            heartDiv.style.animationDuration = 5 + Math.random() * 5 + 's';
            heartDiv.addEventListener('animationend', () => { activeFloatingHearts--; });
            document.body.appendChild(heartDiv);
            activeFloatingHearts++;
            setTimeout(() => heartDiv.remove(), 7000);
        }
        
        // glowing orbs (lighter)
        function spawnGlowOrb() {
            if (finalTriggered) return;
            const orb = document.createElement('div');
            orb.className = 'glow-orb';
            const size = Math.random() * 12 + 5;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + '%';
            orb.style.animationDuration = 6 + Math.random() * 6 + 's';
            orb.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(orb);
            setTimeout(() => orb.remove(), 10000);
        }
        
        function showPopupMessage(text) {
            const existingMsg = document.querySelector('.floating-message');
            if (existingMsg) existingMsg.remove();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'floating-message';
            msgDiv.textContent = text;
            document.body.appendChild(msgDiv);
            // Increase removal timeout to match the longer animation (5.6s)
            setTimeout(() => { if(msgDiv.parentNode) msgDiv.remove(); }, 5600);
        }
        
        function spawnBalloon() {
            if (finalTriggered) return;
            if (currentMsgIndex >= secretMessages.length) return;
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            
            // Randomly pick an image from the list
            const randomImage = balloonImages[Math.floor(Math.random() * balloonImages.length)];
            // Set the image as background
            balloon.style.backgroundImage = `url('${randomImage}')`;
            balloon.style.backgroundSize = 'cover';
            balloon.style.backgroundPosition = 'center';
            
            // Fallback in case image fails to load
            balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            
            balloon.style.left = (5 + Math.random() * 85) + "%";
            const duration = 14 + Math.random() * 10;
            balloon.style.setProperty('--float-duration', duration + "s");
            
            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                if (finalTriggered) return;
                const msgToShow = secretMessages[currentMsgIndex];
                showPopupMessage(msgToShow);
                const rect = balloon.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                addBurst(centerX, centerY, 'rgba(255, 200, 150, 0.8)');
                balloon.remove();
                currentMsgIndex++;
                if (currentMsgIndex === secretMessages.length && !finalTriggered) {
                    triggerGrandFinale();
                }
            });
            balloonContainer.appendChild(balloon);
            setTimeout(() => { if (balloon.parentNode) balloon.remove(); }, duration * 1000 + 800);
        }
        
        function triggerGrandFinale() {
            if (finalTriggered) return;
            finalTriggered = true;
            if (balloonInterval) clearInterval(balloonInterval);
            if (heartRainInterval) clearInterval(heartRainInterval);
            if (glowOrbInterval) clearInterval(glowOrbInterval);
            
            const allBalloons = document.querySelectorAll('.balloon');
            allBalloons.forEach(b => b.remove());
            
            if (titleElement) titleElement.classList.add('hide-title');
            if (hintTap) hintTap.classList.add('hide-hint');
            
            finalVeil.classList.add('active');
            
            // Reduced star rain
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const starRain = document.createElement('span');
                    starRain.style.position = 'absolute';
                    starRain.style.width = Math.random() * 6 + 2 + 'px';
                    starRain.style.height = starRain.style.width;
                    starRain.style.background = `radial-gradient(circle, #FFD966, #FF9FBB)`;
                    starRain.style.borderRadius = '50%';
                    starRain.style.left = Math.random() * 100 + '%';
                    starRain.style.top = '-20px';
                    starRain.style.boxShadow = '0 0 12px gold';
                    starRain.style.pointerEvents = 'none';
                    starRain.style.animation = `fallDown ${4 + Math.random() * 7}s linear forwards`;
                    document.body.appendChild(starRain);
                    setTimeout(() => starRain.remove(), 10000);
                }, i * 30);
            }
            const styleSheet = document.createElement("style");
            styleSheet.textContent = `@keyframes fallDown { 0% { transform: translateY(0) rotate(0deg); opacity: 0.9; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }`;
            document.head.appendChild(styleSheet);
            
            // Fewer heart bursts
            setTimeout(() => {
                for (let h = 0; h < 100; h++) {
                    setTimeout(() => {
                        const heartBurst = document.createElement('div');
                        heartBurst.className = 'heart-shower';
                        heartBurst.innerHTML = '❤️';
                        heartBurst.style.left = window.innerWidth/2 + (Math.random() - 0.5) * 280 + 'px';
                        heartBurst.style.top = window.innerHeight/2 - 50 + 'px';
                        heartBurst.style.fontSize = (16 + Math.random() * 24) + 'px';
                        heartBurst.style.animation = `floatHeartSoft 5s linear forwards`;
                        heartBurst.style.opacity = '0.9';
                        document.body.appendChild(heartBurst);
                        setTimeout(() => heartBurst.remove(), 5000);
                    }, h * 20);
                }
                for (let g = 0; g < 30; g++) {
                    addBurst(window.innerWidth/2 + (Math.random() - 0.5)*180, window.innerHeight/2 - 60, '#FFD966');
                }
            }, 400);
            
            setTimeout(() => {
                finalMsgDiv.innerHTML = ultimateMessage;
                finalMsgDiv.classList.add('visible');
                let encoreInterval = setInterval(() => {
                    if (!finalMsgDiv.parentNode) clearInterval(encoreInterval);
                    const extraHeart = document.createElement('div');
                    extraHeart.className = 'heart-shower';
                    extraHeart.innerHTML = ['❤️','💖','✨','💕'][Math.floor(Math.random()*4)];
                    extraHeart.style.left = Math.random() * 100 + '%';
                    extraHeart.style.bottom = '0px';
                    extraHeart.style.fontSize = (14 + Math.random() * 20) + 'px';
                    extraHeart.style.animationDuration = 6 + Math.random() * 6 + 's';
                    document.body.appendChild(extraHeart);
                    setTimeout(() => extraHeart.remove(), 8000);
                }, 2500);
                setTimeout(() => clearInterval(encoreInterval), 30000);
            }, 2800);
        }
        
        // Music
        function initMusicOnUserGesture() {
            return new Promise((resolve) => {
                const existingPlayerDiv = document.getElementById('youtube-audio');
                if (existingPlayerDiv) return resolve();
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                window.onYouTubeIframeAPIReady = () => {
                    const playerDiv = document.createElement('div');
                    playerDiv.id = 'youtube-audio';
                    playerDiv.style.display = 'none';
                    document.body.appendChild(playerDiv);
                    musicPlayer = new YT.Player('youtube-audio', {
                        videoId: 'BSJa1UytM8w',
                        playerVars: { autoplay: 1, controls: 0, loop: 1, modestbranding: 1, rel: 0, playlist: 'BSJa1UytM8w' },
                        events: {
                            onReady: (event) => {
                                event.target.playVideo();
                                event.target.setVolume(55);
                                resolve();
                            }
                        }
                    });
                };
                if (window.YT && window.YT.Player) {
                    window.onYouTubeIframeAPIReady();
                }
            });
        }
        
        const unlockBtn = document.getElementById('unlockHeart');
        unlockBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await initMusicOnUserGesture();
            } catch(err) { console.log("music non-blocking"); }
            introDiv.style.opacity = '0';
            setTimeout(() => {
                introDiv.style.display = 'none';
                dreamscape.classList.add('reveal');
                balloonInterval = setInterval(() => { if (!finalTriggered) spawnBalloon(); }, 2200);
                heartRainInterval = setInterval(() => { if (!finalTriggered) spawnAmbientHeart(); }, 2200);
                glowOrbInterval = setInterval(() => { if (!finalTriggered) spawnGlowOrb(); }, 2000);
                for (let i = 0; i < 3; i++) setTimeout(() => spawnBalloon(), i * 500);
            }, 1500);
        });
        
        initStars();
        resizeParticleCanvas();
        
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.balloon')) return;
        }, { passive: false });
        
        window.addEventListener('beforeunload', () => {
            if (balloonInterval) clearInterval(balloonInterval);
            if (heartRainInterval) clearInterval(heartRainInterval);
            if (glowOrbInterval) clearInterval(glowOrbInterval);
            if (starAnimationFrame) cancelAnimationFrame(starAnimationFrame);
        });
    })();
</script>
</body>
</html>
