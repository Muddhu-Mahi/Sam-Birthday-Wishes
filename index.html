<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

    <title>Just for you Sam...!</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        :root {
            --pink-love: #ff4d6d;
            --rose-dream: #ff8cae;
            --golden-spark: #ffdd88;
            --deep-purple: #9b5de5;
            --night-sky: #000000;
        }
        body {
            background: var(--night-sky);
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            touch-action: pan-y pinch-zoom;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }
        #stars-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }
        .intro-sacred {
            position: fixed;
            inset: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(12px);
            transition: opacity 1.8s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 1;
        }
        .heart-gate {
            font-size: clamp(80px, 24vw, 120px);
            cursor: pointer;
            line-height: 1;
            position: relative;
            user-select: none;
            touch-action: manipulation;
            color: #ff9ec3;
            background: none;
            transform: perspective(800px) translateZ(0);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 15px 25px rgba(255, 150, 190, 0.35));
            animation: subtleHeartbeat 0.75s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes subtleHeartbeat {
            0% { transform: perspective(800px) translateZ(0) scale(1); text-shadow: 0 0 0px #ff9ec3; filter: drop-shadow(0 12px 22px rgba(255, 120, 170, 0.4));}
            30% { transform: perspective(800px) translateZ(0) scale(1.06); text-shadow: 0 0 12px #ffb7c5; filter: drop-shadow(0 18px 28px rgba(255, 100, 145, 0.6));}
            70% { transform: perspective(800px) translateZ(0) scale(1.02); text-shadow: 0 0 5px #ff9ebc; filter: drop-shadow(0 14px 24px rgba(255, 110, 155, 0.5));}
            100% { transform: perspective(800px) translateZ(0) scale(1); text-shadow: 0 0 0px #ff9ec3; filter: drop-shadow(0 12px 22px rgba(255, 120, 170, 0.4));}
        }
        .heart-gate.fade-out-heart { animation: none; transition: opacity 0.7s ease, transform 0.5s ease; opacity: 0 !important; transform: scale(0.85); filter: drop-shadow(0 0 0 rgba(255,150,190,0)); pointer-events: none; }
        .touch-heart { margin-top: 28px; font-family: 'Dancing Script', 'Times New Roman', Times, serif; font-style: italic; font-weight: 500; font-size: clamp(1.1rem, 4vw, 1.8rem); color: pink; text-shadow: 0 0 30px #8c8479, 0 0 60px #ff4d6d; letter-spacing: 1px; background: none; backdrop-filter: blur(4px); padding: 8px 16px; border-radius: 60px; pointer-events: none; transition: opacity 1s cubic-bezier(0.2, 0.9, 0.4, 1), transform 0.8s ease; }
        .touch-heart.fade-out-text { opacity: 0 !important; transform: translateY(20px) scale(0.9); pointer-events: none; }
        #dreamscape { opacity: 0; transition: opacity 2.2s cubic-bezier(0.3, 0.9, 0.2, 1); height: 100vh; width: 100%; position: relative; z-index: 10; pointer-events: none; }
        #dreamscape.reveal { opacity: 1; pointer-events: auto; }
        .title-magic { font-family: 'Times New Roman', Times, serif; font-weight: 400; font-style: italic; text-align: center; padding-top: max(24px, 4vh); font-size: clamp(2.8rem, 14vw, 5.6rem); color: rgb(153, 152, 152); letter-spacing: 2px; position: relative; display: inline-block; left: 50%; transform: translateX(-50%); white-space: nowrap; animation: titleFloat 4s ease-in-out infinite; pointer-events: none; transition: opacity 0.8s ease; will-change: transform; max-width: 95vw; overflow-x: auto; scrollbar-width: none; }
        .title-magic::-webkit-scrollbar { display: none; }
        @keyframes titleFloat { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-10px); } }
        .title-magic.hide-title { opacity: 0; visibility: hidden; }
        .balloon-sky { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 20; }
        .balloon {
            position: absolute;
            width: clamp(68px, 18vw, 105px);
            height: calc(clamp(68px, 18vw, 105px) * 1.28);
            border-radius: 50% 50% 50% 50% / 50% 50% 45% 45%;
            cursor: pointer;
            pointer-events: auto;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 18px rgba(0,0,0,0.2), inset 0 -2px 0 rgba(0,0,0,0.05);
            animation: floatUp var(--float-duration) linear forwards;
            transition: filter 0.1s, opacity 0.65s cubic-bezier(0.2, 0.9, 0.4, 1), transform 0.65s cubic-bezier(0.2, 0.9, 0.4, 1);
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .balloon:active { filter: brightness(1.05); transform: scale(0.97); }
        .balloon::before { content: "✦"; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); font-size: 1rem; color: #777776; text-shadow: 0 0 4px rgba(255,255,255,0.7); pointer-events: none; z-index: 3; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));}
        .balloon::after { content: ''; position: absolute; bottom: -28px; left: 50%; width: 2px; height: 32px; background: #b1b1b1; transform: translateX(-50%); border-radius: 1px; pointer-events: none; z-index: 1;}
        @keyframes floatUp { 0% { transform: translateY(110vh) rotate(-2deg); opacity: 0.9; } 100% { transform: translateY(-150vh) rotate(3deg); opacity: 0.5; } }
        .symbol-fade-out {
            animation: none !important;
            transition: opacity 0.65s cubic-bezier(0.2, 0.9, 0.4, 1), transform 0.65s cubic-bezier(0.2, 0.9, 0.4, 1) !important;
            opacity: 0 !important;
            transform: scale(0.92) !important;
            pointer-events: none !important;
        }
        .floating-message {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: black;
            backdrop-filter: blur(18px);
            padding: 1.2rem 3rem;
            border-radius: 40px;
            font-family: 'Dancing Script', 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            text-align: center;
            color: rgb(239, 234, 235);
            max-width: 92vw;
            width: auto;
            min-width: 280px;
            box-shadow: 0 0 55px rgba(248, 247, 247, 0.65), 0 0 22px rgba(48, 48, 48, 0.45);
            letter-spacing: 1px;
            z-index: 200;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1), transform 1.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            pointer-events: none;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(255, 100, 120, 0.9);
            word-break: break-word;
            white-space: normal;
            box-sizing: border-box;
        }
        .floating-message.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #final-veil { position: fixed; inset: 0; background: transparent; z-index: 70; opacity: 0; transition: opacity 4s ease; pointer-events: none; }
        #final-veil.active { background: #000000; opacity: 1; }
        .grand-message { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Playfair Display', 'Times New Roman', serif; font-weight: 500; font-style: italic; background: #000000; color: #fff8ed; z-index: 100; opacity: 0; transition: opacity 2.5s ease 0.2s; pointer-events: none; text-align: center; box-sizing: border-box; padding: 2rem; }
        .grand-message.visible { opacity: 1; }
        .final-center-text { font-size: clamp(1.2rem, 5vw, 2.2rem); text-shadow: 0 0 30px #ffb347, 0 0 60px #ff4d6d; padding: 1rem; line-height: 1.4; max-width: 85vw; word-break: break-word; }
        .final-bottom-text { margin-top: 2rem; font-size: clamp(0.7rem, 3vw, 0.9rem); font-family: 'Playfair Display', serif; font-weight: 400; font-style: italic; letter-spacing: 0.5px; color: rgba(255, 245, 210, 0.85); background: none; padding: 6px 0; text-shadow: 0 0 2px rgba(0,0,0,0.3); }
        .grand-message .final-bottom-text {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            margin-top: 0;
        }
        .grand-message .final-center-text {
            margin-bottom: 70px;
        }
        #particle-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 80; }
        .heart-shower { position: absolute; font-size: 1.6rem; pointer-events: none; animation: floatHeartSoft 7s linear forwards; z-index: 90; will-change: transform; }
        @keyframes floatHeartSoft { 0% { transform: translateY(0) rotate(0deg); opacity: 0.9; } 100% { transform: translateY(-130vh) rotate(360deg); opacity: 0; } }
        .glow-orb { position: absolute; background: radial-gradient(circle, #ffdd99, #ffb347); border-radius: 50%; filter: blur(2px); pointer-events: none; animation: floatUpGlow 8s linear forwards; z-index: 85; opacity: 0; will-change: transform; }
        @keyframes floatUpGlow { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-20vh) scale(1.2); opacity: 0; } }
        .burst-heart { position: fixed; pointer-events: none; font-size: 1.8rem; z-index: 10002; animation: burstFloat 1.2s ease-out forwards; will-change: transform, opacity; }
        @keyframes burstFloat { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--dx, 40px), var(--dy, -80px)) scale(0.3) rotate(360deg); opacity: 0; } }
        .grand-message.pulse-glow { animation: gentlePulse 2s infinite ease-in-out; }
        @keyframes gentlePulse { 0%,100% { text-shadow: 0 0 10px #ffb347, 0 0 20px #ff4d6d; } 50% { text-shadow: 0 0 30px #ffb347, 0 0 50px #ff4d6d; } }
        .romantic-veil { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(255, 77, 109, 0.2), transparent 70%); pointer-events: none; z-index: 75; opacity: 0; transition: opacity 3.5s ease; animation: gentleGlow 4s ease-in-out infinite; }
        .romantic-veil.active { opacity: 1; }
        @keyframes gentleGlow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.15); } }
        .hint-tap { position: fixed; bottom: 25px; left: 0; right: 0; text-align: center; font-size: 13px; font-weight: 300; color: rgba(255,220,200,0.6); background: rgba(0,0,0,0.3); width: fit-content; margin: 0 auto; padding: 5px 16px; border-radius: 50px; backdrop-filter: blur(4px); z-index: 25; pointer-events: none; font-family: monospace; transition: opacity 0.8s ease; }
        .hint-tap.hide-hint { opacity: 0; visibility: hidden; }
        @media (max-width: 600px) {
            .balloon { width: 70px; height: 88px; }
            .floating-message { padding: 1rem 2rem; font-size: clamp(1.1rem, 4.8vw, 1.7rem); max-width: 94vw; min-width: 260px; border-radius: 48px; line-height: 1.4; background: rgba(0,0,0,0.92); backdrop-filter: blur(24px); text-shadow: 0 0 12px rgba(255, 100, 120, 0.95);}
            .final-center-text { font-size: clamp(1.1rem, 5.5vw, 2rem); padding: 0.8rem; max-width: 90vw; }
            .title-magic { white-space: nowrap; font-size: clamp(2rem, 12vw, 4.2rem); max-width: 94vw; overflow-x: auto; }
            .heart-gate { animation: subtleHeartbeat 0.7s ease-in-out infinite; font-size: clamp(70px, 22vw, 110px); }
            .grand-message .final-center-text { margin-bottom: 60px; }
            .grand-message .final-bottom-text { bottom: 16px; }
        }
        @media (prefers-reduced-motion: reduce) { *, .balloon, .heart-shower, .floating-message { animation: none !important; transition: none !important; } .balloon { display: none; } }
    </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div id="introScreen" class="intro-sacred">
    <div class="heart-gate" id="unlockHeart">❤️</div>
    <div class="touch-heart" id="touchHeartText">🎀 Touch my heart 🎀</div>
</div>
<div id="dreamscape">
    <h1 class="title-magic">Sam...</h1>
    <div id="balloonContainer" class="balloon-sky"></div>
    <div class="hint-tap">🎈 Pop a balloon → A surprise inside 🎈</div>
</div>
<div id="romanticVeil" class="romantic-veil"></div>
<div id="final-veil"></div>
<div id="grandFinaleMessage" class="grand-message"></div>
<canvas id="particle-canvas"></canvas>

<script>
    (function() {
        
        const balloonImages = [
            "https://ik.imagekit.io/njn8geuh0/S24.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S17.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S32.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S31.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S28.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S42.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S2.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S26.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S14E.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S3.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S20.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S22.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S44.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S36.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S21.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S23.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S41.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S43.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S24.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S25.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S29.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S34.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S35.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S40E.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S39.jpeg",
            "https://ik.imagekit.io/njn8geuh0/S7.jpeg",
        ];
        
        // Beautiful birthday messages (20 total)
        const secretMessages = [
            "🎂🌹✨ Happy Birthday, Sam… our family’s Lady Power Star 👑💖🎉",
            "👗💃 Sam, your style? Just on another level 🌟🕶️",
            "🔥💯 Confidence? Not shown… it just naturally radiates from you ⚡🌠",
            "😊🌼 You may seem simple… but your presence is powerful 💫🔥",
            "👑 That attitude? The reason you always stand out 🏆✨",
            "⚡💥 That spark in you? It just makes you look even better… 🪄🌟",
            "💖✨ Natural beauty… no filters needed 🌸🌷",
            "😊💕 Your smile brings a special kind of happiness 🌼🤍",
            "🎶😄 Your laugh is really nice to hear… better than any playlist 💫🎵",
            "👀⚡ Your eyes… honestly, they’re a little dangerous 💖🌸 — one look, it’s hard to look away 🔥",
            "🌹💖 Saree + You = dangerously beautiful 🔥💕 Too much elegance in one frame… not fair at all 😮‍💨💖✨",
            "🧠💎 Beauty with brilliance… a truly rare combination 📚✨",
            "💯🔥 You speak straight… real and unfiltered ⚡💥",
            "🐾💖 Your love for pets is just one example of how caring and kind you are 🐶❤️",
            "🤍🌙 Your ability to understand others makes you truly special 💞🫶",
            "💖🔥 Your emotions are genuine and deep… something very rare 🌹💫",
            "🌊✨ There’s a beautiful depth in you that not everyone sees… but it’s magical 🪄🌙",
            "🌸💐 Modern look… traditional heart… the perfect blend 🌼🕉️",
            "🛡️❤️ Your support is always so strong and steady… it lifts me up every single time 💪🤍",
            "🌟😊💖 …hope you have a smile on your face 🥰 I wish I could see it, but I’m not there ✨🌸",
            "🎈🎉 Once again Happy Birthday, Sam! 💖🥳 Thank you for always understanding me even without words 🥰💕 Wishing you a year filled with happiness 😊🌸, success 💼🚀, and everything your beautiful heart deserves… 💎❤️"
        ];
        
        let currentMsgIndex = 0;
        let currentImageIndex = 0;    // <-- sequential image index (0 to 13, then wraps)
        let balloonInterval = null;
        let heartRainInterval = null;
        let glowOrbInterval = null;
        let finalTriggered = false;
        let waitingForFinale = false;
        let heartClicked = false;
        let youtubePlayer = null;
        let songLoopTimer = null;

        const introDiv = document.getElementById('introScreen');
        const dreamscape = document.getElementById('dreamscape');
        const balloonContainer = document.getElementById('balloonContainer');
        const finalVeil = document.getElementById('final-veil');
        const finalMsgDiv = document.getElementById('grandFinaleMessage');
        const titleElement = document.querySelector('.title-magic');
        const hintTap = document.querySelector('.hint-tap');
        const heartElement = document.getElementById('unlockHeart');
        const touchText = document.getElementById('touchHeartText');

        const balloonColors = ['#FF9FBB', '#F6AE9A', '#D9B4FF', '#FFD966', '#F4ACB7', '#A7C7E7', '#FFB3BA', '#C3A5F0'];

        // Stars background
        const starCanvas = document.getElementById('stars-canvas');
        const starCtx = starCanvas.getContext('2d');
        let starsArray = [];
        function initStars() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            const starCount = Math.min(180, Math.floor(window.innerWidth * window.innerHeight / 5000));
            for (let i = 0; i < starCount; i++) {
                starsArray.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * starCanvas.height,
                    radius: Math.random() * 2.2 + 0.8,
                    alpha: Math.random() * 0.6 + 0.2,
                    twinkleSpeed: 0.008 + Math.random() * 0.02,
                    twinkleDir: Math.random() > 0.5 ? 1 : -1
                });
            }
            animateStars();
        }
        let starAnimationFrame;
        function animateStars() {
            if (!starCtx) return;
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            for (let s of starsArray) {
                s.alpha += s.twinkleSpeed * s.twinkleDir;
                if (s.alpha > 0.85) { s.alpha = 0.85; s.twinkleDir = -1; }
                if (s.alpha < 0.2) { s.alpha = 0.2; s.twinkleDir = 1; }
                starCtx.beginPath();
                starCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                starCtx.fillStyle = `rgba(255, 240, 200, ${s.alpha * 0.9})`;
                starCtx.fill();
            }
            starAnimationFrame = requestAnimationFrame(animateStars);
        }

        // Particle explosion system
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];
        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeParticleCanvas);
        resizeParticleCanvas();

        function addBurst(x, y, baseColor, count = 16) {
            const particleCount = Math.min(count, window.innerWidth < 600 ? 12 : 18);
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 12;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 5,
                    size: 3 + Math.random() * 10,
                    color: baseColor || `hsl(${Math.random() * 40 + 320}, 80%, 65%)`,
                    alpha: 0.9,
                    life: 0.98,
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12
                });
            }
        }
        function renderParticles() {
            if (!pCtx) return;
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.alpha *= 0.97;
                p.life -= 0.012;
                if (p.alpha <= 0.02 || p.life <= 0 || p.y > particleCanvas.height + 100) {
                    particles.splice(i, 1);
                    i--;
                    continue;
                }
                pCtx.save();
                pCtx.globalAlpha = p.alpha * p.life;
                pCtx.fillStyle = p.color;
                pCtx.translate(p.x, p.y);
                pCtx.rotate(p.rot * Math.PI / 180);
                pCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                pCtx.restore();
                p.rot += p.rotSpeed;
            }
            requestAnimationFrame(renderParticles);
        }
        renderParticles();

        // Ambient floating hearts & orbs
        let activeFloatingHearts = 0;
        const MAX_FLOATING_HEARTS = window.innerWidth < 600 ? 18 : 24;
        const floatingSymbols = ['✨', '💫', '💖', '💕', '🌸', '🦋', '🎈', '🌙'];

        function spawnAmbientHeart() {
            if (finalTriggered || waitingForFinale) return;
            if (activeFloatingHearts >= MAX_FLOATING_HEARTS) return;
            const heartDiv = document.createElement('div');
            heartDiv.className = 'heart-shower';
            heartDiv.innerHTML = floatingSymbols[Math.floor(Math.random() * floatingSymbols.length)];
            heartDiv.style.left = Math.random() * 100 + '%';
            heartDiv.style.bottom = '-20px';
            heartDiv.style.fontSize = (Math.random() * 18 + 16) + 'px';
            heartDiv.style.opacity = 0.75;
            heartDiv.style.animationDuration = 5 + Math.random() * 5 + 's';
            heartDiv.addEventListener('animationend', () => { activeFloatingHearts--; });
            document.body.appendChild(heartDiv);
            activeFloatingHearts++;
            setTimeout(() => heartDiv.remove(), 7000);
        }

        function spawnGlowOrb() {
            if (finalTriggered || waitingForFinale) return;
            if (window.innerWidth < 600 && Math.random() > 0.6) return;
            const orb = document.createElement('div');
            orb.className = 'glow-orb';
            const size = Math.random() * 12 + 5;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + '%';
            orb.style.animationDuration = 6 + Math.random() * 6 + 's';
            orb.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(orb);
            setTimeout(() => orb.remove(), 10000);
        }

        function spawnHeartBurst(centerX, centerY) {
            for (let i = 0; i < 28; i++) {
                const heartSpan = document.createElement('div');
                heartSpan.className = 'burst-heart';
                heartSpan.innerHTML = ['❤️', '💖', '💗', '💓', '💘', '💝', '✨'][Math.floor(Math.random() * 7)];
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 100;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 40;
                heartSpan.style.setProperty('--dx', dx + 'px');
                heartSpan.style.setProperty('--dy', dy + 'px');
                heartSpan.style.left = (centerX - 18) + 'px';
                heartSpan.style.top = (centerY - 20) + 'px';
                heartSpan.style.fontSize = (18 + Math.random() * 20) + 'px';
                document.body.appendChild(heartSpan);
                setTimeout(() => heartSpan.remove(), 1200);
            }
        }

        function fadeOutBalloonsAndDecorations() {
            const elements = document.querySelectorAll('.balloon, .heart-shower, .glow-orb, .burst-heart');
            elements.forEach(el => {
                void el.offsetWidth;
                el.classList.add('symbol-fade-out');
                el.style.pointerEvents = 'none';
                setTimeout(() => { if (el.parentNode) el.remove(); }, 800);
            });
        }

        function showPopupMessage(text, onRemoved = null, durationMs = 4000) {
            const existing = document.querySelector('.floating-message');
            if (existing) existing.remove();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'floating-message';
            msgDiv.textContent = text;
            document.body.appendChild(msgDiv);
            msgDiv.offsetHeight;
            msgDiv.classList.add('visible');
            setTimeout(() => {
                msgDiv.classList.remove('visible');
                setTimeout(() => {
                    if (msgDiv.parentNode) msgDiv.remove();
                    if (onRemoved) onRemoved();
                }, 1300);
            }, durationMs);
        }

        function showFinalCredit() {
            finalMsgDiv.innerHTML = `
                <div class="final-center-text">🌹 Made with 💖 by Mahi 🌹</div>
                <div class="final-bottom-text">© 2026 Mahi</div>
            `;
            finalMsgDiv.classList.add('visible', 'pulse-glow');
            finalVeil.classList.add('active');
        }

        // ---------- FIX: Balloon images appear IN ORDER (S1, S2, S3 ... S14, then cycle) ----------
        function spawnBalloon() {
            if (finalTriggered || waitingForFinale) return;
            if (currentMsgIndex >= secretMessages.length) return;

            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            
            // Get next image in sequence, then increment (wrap around)
            const imageUrl = balloonImages[currentImageIndex];
            currentImageIndex = (currentImageIndex + 1) % balloonImages.length;
            
            balloon.style.backgroundImage = `url('${imageUrl}')`;
            balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloon.style.left = (5 + Math.random() * 85) + "%";
            const duration = 14 + Math.random() * 10;
            balloon.style.setProperty('--float-duration', duration + "s");

            // fallback in case any image fails to load
            balloon.addEventListener('error', () => {
                balloon.style.backgroundImage = `url('https://ik.imagekit.io/njn8geuh0/S1.jpeg')`;
            });

            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                if (finalTriggered || waitingForFinale) return;
                
                if (hintTap && !hintTap.classList.contains('hide-hint')) hintTap.classList.add('hide-hint');
                if (titleElement && !titleElement.classList.contains('hide-title')) titleElement.classList.add('hide-title');
                
                const isLastMsg = (currentMsgIndex === secretMessages.length - 1);
                const msg = secretMessages[currentMsgIndex];
                const rect = balloon.getBoundingClientRect();
                const clickX = rect.left + rect.width / 2;
                const clickY = rect.top + rect.height / 2;
                
                if (isLastMsg) {
                    waitingForFinale = true;
                    if (balloonInterval) clearInterval(balloonInterval);
                    if (heartRainInterval) clearInterval(heartRainInterval);
                    if (glowOrbInterval) clearInterval(glowOrbInterval);
                    
                    fadeOutBalloonsAndDecorations();
                    showPopupMessage(msg, () => {
                        finalTriggered = true;
                        showFinalCredit();
                    }, 10000);
                } else {
                    showPopupMessage(msg, null, 4000);
                }
                
                addBurst(clickX, clickY, '#ffaa77', 20);
                balloon.remove();
                currentMsgIndex++;
            });

            balloonContainer.appendChild(balloon);
            setTimeout(() => { if (balloon.parentNode) balloon.remove(); }, duration * 1000 + 800);
        }

        // ---------- LOOPING SONG (32 sec loop) ----------
        function startSong() {
            if (youtubePlayer) return;
            const playerDiv = document.createElement('div');
            playerDiv.id = 'youtube-audio';
            playerDiv.style.display = 'none';
            document.body.appendChild(playerDiv);

            window.onYouTubeIframeAPIReady = function() {
                youtubePlayer = new YT.Player('youtube-audio', {
                    videoId: '9pdCsCaDFF4',
                    playerVars: {
                        autoplay: 1,
                        controls: 0,
                        loop: 0,
                        modestbranding: 1,
                        rel: 0
                    },
                    events: {
                        onReady: function(event) {
                            event.target.playVideo();
                            event.target.setVolume(40);
                            songLoopTimer = setInterval(() => {
                                if (youtubePlayer) {
                                    youtubePlayer.seekTo(0, true);
                                    youtubePlayer.playVideo();
                                }
                            }, 32000);
                        },
                        onStateChange: function(event) {
                            if (event.data === YT.PlayerState.ENDED) {
                                youtubePlayer.seekTo(0, true);
                                youtubePlayer.playVideo();
                            }
                        }
                    }
                });
            };
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        }

        // Heart intro & reveal world
        function handleHeartTouch() {
            if (heartClicked) return;
            heartClicked = true;

            heartElement.classList.add('fade-out-heart');
            if (touchText) touchText.classList.add('fade-out-text');

            const rect = heartElement.getBoundingClientRect();
            spawnHeartBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
            addBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#ff99cc');

            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.inset = '0';
            flash.style.background = 'radial-gradient(circle, rgba(255,200,180,0.3), transparent)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '10001';
            flash.style.opacity = '0.8';
            flash.style.transition = 'opacity 0.4s ease';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 500);
            }, 100);

            setTimeout(() => {
                introDiv.style.opacity = '0';
                setTimeout(() => {
                    introDiv.style.display = 'none';
                    dreamscape.classList.add('reveal');
                    startSong(); 

                    balloonInterval = setInterval(() => {
                        if (!finalTriggered && !waitingForFinale) spawnBalloon();
                    }, 2200);

                    heartRainInterval = setInterval(() => {
                        if (!finalTriggered && !waitingForFinale) spawnAmbientHeart();
                    }, 2200);

                    glowOrbInterval = setInterval(() => {
                        if (!finalTriggered && !waitingForFinale) spawnGlowOrb();
                    }, 2000);

                    for (let i = 0; i < 3; i++) {
                        setTimeout(spawnBalloon, i * 500);
                    }
                }, 800);
            }, 400);
        }

        heartElement.addEventListener('click', handleHeartTouch);
        initStars();

        window.addEventListener('beforeunload', () => {
            if (balloonInterval) clearInterval(balloonInterval);
            if (heartRainInterval) clearInterval(heartRainInterval);
            if (glowOrbInterval) clearInterval(glowOrbInterval);
            if (songLoopTimer) clearInterval(songLoopTimer);
            if (starAnimationFrame) cancelAnimationFrame(starAnimationFrame);
            if (youtubePlayer) youtubePlayer.destroy();
        });
    })();
</script>
</body>
</html>
